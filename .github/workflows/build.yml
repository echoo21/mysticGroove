name: Build Mystic Groove

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:  # allow manual trigger from Actions tab

jobs:
  build:
    runs-on: macos-latest   # macOS runner — Qt di macOS native

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          modules: 'qtquick3d qt5compat qtshadertools'
          cache: true

      - name: Configure CMake
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${{env.Qt6_DIR}}"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Deploy Qt frameworks (macOS .app)
        run: |
          # Bundle Qt libraries into .app
          macdeployqt build/mysticGrooveApp.app \
            -qmldir=. \
            -verbose=1

      - name: Sign .app (ad-hoc for CI)
        run: codesign --force --deep --sign - build/mysticGrooveApp.app

      - name: Archive .app as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MysticGroove-macOS
          path: build/mysticGrooveApp.app
          compression-level: 9
